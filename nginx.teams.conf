server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (X-Frame-Options omitted — Teams needs to iframe us)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # Teams' tab and dialog iframes need explicit allow-listing via CSP frame-ancestors.
  # *.teams.microsoft.com covers the desktop / web clients; *.skype.com is Teams mobile.
  add_header Content-Security-Policy "frame-ancestors 'self' https://*.teams.microsoft.com https://*.skype.com https://*.office.com https://*.microsoft.com;" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Teams tab + message extension served at /teams/
  location /teams/ {
    try_files $uri $uri/ /teams/index.html;
  }

  # Long-cache hashed assets (Vite outputs content-hashed filenames)
  location ~* /teams/assets/.+\.(js|css|woff2|svg|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the entry points or the callback page — they're tiny and need
  # to pick up new bundle hashes immediately on deploy.
  location = /teams/index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }
  location = /teams/messageExtension.html {
    add_header Cache-Control "no-store, must-revalidate";
  }
  location = /teams/auth/callback.html {
    add_header Cache-Control "no-store, must-revalidate";
  }
}
