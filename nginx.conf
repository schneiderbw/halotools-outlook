server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (X-Frame-Options omitted — Outlook needs to iframe us)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # HSTS — applied unconditionally because TLS is terminated upstream (Cloudflare/EasyPanel).
  # Browsers ignore the header on plain-HTTP responses, so this is safe even though nginx
  # only listens on :80 inside the container.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Add-in served at /outlook/
  location /outlook/ {
    try_files $uri $uri/ /outlook/index.html;
  }

  # Long-cache hashed assets (Vite outputs content-hashed filenames)
  location ~* /outlook/assets/.+\.(js|css|woff2|svg|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the entry point or the callback page
  location = /outlook/index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }
  location = /outlook/auth/callback.html {
    add_header Cache-Control "no-store, must-revalidate";
  }

  # Marketing landing page at root. Plain static HTML copied in via the Dockerfile.
  location = / {
    add_header Cache-Control "no-store, must-revalidate";
    try_files /index.html =404;
  }
}
