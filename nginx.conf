server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (X-Frame-Options omitted — Outlook needs to iframe us)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Add-in served at /outlook/
  location /outlook/ {
    try_files $uri $uri/ /outlook/index.html;
  }

  # Long-cache hashed assets (Vite outputs content-hashed filenames)
  location ~* /outlook/assets/.+\.(js|css|woff2|svg|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the entry point or the callback page
  location = /outlook/index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }
  location = /outlook/auth/callback.html {
    add_header Cache-Control "no-store, must-revalidate";
  }

  # Tiny landing at root — placeholder for the future tools hub
  location = / {
    return 302 /outlook/;
  }
}
