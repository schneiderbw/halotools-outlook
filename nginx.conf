server {
  listen 80;
  server_name _;

  # Surface every request in container stdout so EasyPanel's Logs view shows
  # them. Alpine nginx defaults to /var/log/nginx/access.log which is invisible
  # there. Format includes X-Forwarded-* so we can see what reached us
  # through Cloudflare → EasyPanel.
  access_log /dev/stdout;
  error_log /dev/stderr info;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (X-Frame-Options omitted — Outlook needs to iframe us)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # HSTS — applied unconditionally because TLS is terminated upstream (Cloudflare/EasyPanel).
  # Browsers ignore the header on plain-HTTP responses, so this is safe even though nginx
  # only listens on :80 inside the container.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ---- MCP server (Node) ----
  # Reverse-proxy /mcp/* to the Node process running on localhost:3001.
  # `proxy_buffering off` is critical so the Streamable HTTP transport can
  # stream SSE chunks to MCP clients without nginx holding them. Long
  # `proxy_read_timeout` accommodates slow Halo tool calls.
  location /mcp/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  # ---- Universal OAuth callback ----
  # Single redirect_uri for every tool in the hub. The Node server dispatches
  # by state-prefix (outlook:, mcp:, ...) so admins only register this one URL
  # in their Halo Connect app.
  location = /auth/callback {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Add-in served at /outlook/
  location /outlook/ {
    try_files $uri $uri/ /outlook/index.html;
  }

  # Long-cache hashed Vite bundles — content-hashed filenames make these safe
  # to pin forever. Must come BEFORE the no-store regex below; first matching
  # regex wins in nginx so order matters here.
  location ~* /outlook/assets/.+\.(js|css|woff2|svg|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Entry points and bootstrap scripts (unhashed) — must revalidate every fetch.
  # Covers the task pane / compose / setup HTML, the auth callback, the on-send
  # runtime files (launchevent.html, launchevent.js), the manifest, and the
  # latest.json version metadata.
  #
  # no-store stops Cloudflare from pinning these at the edge. The alternative —
  # versioned URLs — can't fix the underlying problem when the HTML page that
  # links to launchevent.js is itself cached: the cached HTML keeps loading
  # the same versioned JS URL and never sees the new version string.
  #
  # Cloudflare honors Cache-Control: no-store, so this is the one-step fix
  # without needing CDN-side Page Rules.
  location ~* /outlook/.+\.(html|js|json)$ {
    add_header Cache-Control "no-store, must-revalidate" always;
    try_files $uri =404;
  }

  # Teams app — same container can serve both surfaces when the Teams dist is
  # also copied into /usr/share/nginx/html/teams. Deploy this either via the
  # sibling Dockerfile.teams (separate EasyPanel service) or by extending the
  # root Dockerfile to COPY both dists into one image.
  location /teams/ {
    try_files $uri $uri/ /teams/index.html;
  }
  location ~* /teams/assets/.+\.(js|css|woff2|svg|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
  location ~* /teams/.+\.(html|js|json)$ {
    add_header Cache-Control "no-store, must-revalidate" always;
    try_files $uri =404;
  }

  # Marketing landing page at root. Plain static HTML copied in via the Dockerfile.
  location = / {
    add_header Cache-Control "no-store, must-revalidate";
    try_files /index.html =404;
  }
}
