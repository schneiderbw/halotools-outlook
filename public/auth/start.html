<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signing in…</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: "Segoe UI", system-ui, sans-serif; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: #faf9f8;
        color: #323130;
      }
      .spinner {
        width: 28px; height: 28px;
        border: 3px solid #c7c7c7;
        border-top-color: #0f6cbd;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .err { color: #a4262c; max-width: 80%; text-align: center; font-size: 13px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="spinner" id="spinner"></div>
    <div id="status">Redirecting to HaloPSA…</div>
    <script>
      // displayDialogAsync requires the initial URL to be at the same origin as
      // the add-in. This bounce page satisfies that — the dialog opens here,
      // then immediately redirects to the OAuth provider passed via ?to=.
      var to = new URLSearchParams(window.location.search).get("to");
      if (to && /^https:\/\//i.test(to)) {
        window.location.replace(to);
      } else {
        document.getElementById("spinner").style.display = "none";
        var el = document.getElementById("status");
        el.className = "err";
        el.textContent = "Missing or invalid redirect target.";
      }
    </script>
  </body>
</html>
