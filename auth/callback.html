<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signing in…</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <style>
      html, body { height: 100%; margin: 0; font-family: "Segoe UI", system-ui, sans-serif; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: #faf9f8;
        color: #323130;
      }
      .spinner {
        width: 28px; height: 28px;
        border: 3px solid #c7c7c7;
        border-top-color: #0f6cbd;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .err {
        color: #a4262c;
        max-width: 80%;
        text-align: center;
        font-size: 13px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="spinner" id="spinner"></div>
    <div id="status">Finalizing sign-in…</div>
    <script>
      // This page runs inside the Office Dialog opened by displayDialogAsync().
      // Halo redirects here with ?code=... or ?error=... — we relay that to the parent
      // task pane via Office.context.ui.messageParent, then the parent closes us.

      function send(payload) {
        try {
          Office.context.ui.messageParent(JSON.stringify(payload));
        } catch (e) {
          // If Office.js isn't available (dialog opened outside Office, e.g. browser testing),
          // fall back to postMessage for dev convenience.
          if (window.opener) {
            window.opener.postMessage({ source: "halo-addin-auth", payload }, "*");
          }
          document.getElementById("status").textContent =
            "Sign-in complete. You can close this window.";
        }
      }

      Office.onReady(function () {
        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");
        var state = params.get("state");
        var error = params.get("error");
        var errorDescription = params.get("error_description");

        if (error) {
          document.getElementById("spinner").style.display = "none";
          var el = document.getElementById("status");
          el.className = "err";
          el.textContent = error + ": " + (errorDescription || "");
          send({ error: error, errorDescription: errorDescription });
          return;
        }
        if (!code) {
          document.getElementById("status").textContent = "No authorization code received.";
          send({ error: "no_code" });
          return;
        }
        send({ code: code, state: state });
      });
    </script>
  </body>
</html>
